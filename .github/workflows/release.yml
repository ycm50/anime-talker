name: Android Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（留空自动: run_number）'
        required: false
        type: string
      release_notes:
        description: '发布说明'
        required: false
        type: string
        default: ''

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK (Release)
        run: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

      - name: Rename APK
        run: |
          VERSION="${{ inputs.version || format('v{0}', github.run_number) }}"
          cp frontend/android/app/build/outputs/apk/release/app-release.apk \
             jiuguan-$VERSION.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiuguan-${{ inputs.version || format('v{0}', github.run_number) }}
          path: jiuguan-*.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/master'
        with:
          tag_name: ${{ inputs.version || format('v{0}', github.run_number) }}
          name: Release ${{ inputs.version || format('v{0}', github.run_number) }}
          body: ${{ inputs.release_notes || '自动构建 Android APK' }}
          draft: true
          files: jiuguan-*.apk
